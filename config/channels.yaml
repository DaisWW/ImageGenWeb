version: 1

queue:
  # 生产并发：刀哥的 2 + Lucen 4；仍受单用户并发限制。
  global_concurrency: 6
  max_queued_per_user: 20
  max_queued_global: 100
  history_retention_days: 30
  stale_running_minutes: 20

channels:
  - id: current
    label: 刀哥的
    enabled: true
    adapter: openai_images
    base_url: https://fuck.codexapis.com
    base_url_env: IMAGE_API_BASE_URL
    api_key_env: IMAGE_API_KEY
    models:
      - id: gpt-image-2
        label: GPT Image 2
        enabled: true
    price_rmb: 0.0600
    capabilities:
      modes: [text2img, img2img]
      # 2026-07-17 使用 gpt-image-2、low、PNG 实测垫图合并：
      # 2～8、17、32 张请求均成功；32 张结果完整保留 01～32，未漏图或重复。
      # 32 张仍未触及刀哥的上游硬上限，但返回尺寸有偏离请求值的情况。
      # 为与 Lucen 的实测可用上限保持一致，生产统一限制为 20 张。
      max_reference_images: 20
      max_reference_image_mb: 10
      max_reference_total_mb: 40
      sizes: [1024x1024, 1536x1024, 1024x1536]
      formats: [png, jpeg, webp]
    limits:
      # 上游余额或频控问题解决并复测前，暂采用此值。
      max_concurrency: 2
      timeout_seconds: 600
      estimated_seconds: 180

  - id: lucen
    label: Lucen
    enabled: true
    adapter: openai_images
    base_url: https://lucen.plus
    base_url_env: LUCEN_API_BASE_URL
    api_key_env: LUCEN_API_KEY
    models:
      - id: gpt-image-2
        label: GPT Image 2
        enabled: true
    price_rmb: 0.0900
    capabilities:
      modes: [text2img, img2img]
      # 2026-07-17 使用 gpt-image-2、low、PNG 实测垫图合并：
      # 1～8、17、20 张请求均成功；20 张结果完整保留 01～20，未漏图或重复。
      # 21、22、24、31、32 张均返回 HTTP 502，32 张重试仍失败。
      # 上游未返回明确的数量超限错误，因此 20 张是当前接口行为的实测可用上限。
      max_reference_images: 20
      max_reference_image_mb: 10
      max_reference_total_mb: 40
      sizes: [1024x1024, 1536x1024, 1024x1536]
      formats: [png, jpeg, webp]
    limits:
      # 2026-07-14：8 路/16 张图片测试通过；4 路可保留稳定延迟余量。
      max_concurrency: 4
      timeout_seconds: 600
      # 2026-07-15：13 次成功调用的双侧 10% 截尾均值为 144.5 秒。
      estimated_seconds: 145
