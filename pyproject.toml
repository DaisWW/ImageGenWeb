[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
  ".ui-test-data",
  ".ui-perf-data",
  "backups",
  "data",
  "output",
  "outputs",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]
