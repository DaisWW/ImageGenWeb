name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: imagegen_test
          POSTGRES_USER: imagegen
          POSTGRES_PASSWORD: imagegen_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U imagegen -d imagegen_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements*.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci
          npx playwright install --with-deps chromium

      - name: Lint and format
        run: |
          python -m ruff check .
          python -m ruff format --check imagegen tests app.py run_worker.py migrations scripts

      - name: Compile Python
        run: python -m compileall -q imagegen app.py run_worker.py

      - name: Check JavaScript syntax
        run: |
          node --check static/js/common.js
          node --check static/js/studio.js
          node --check static/js/admin.js

      - name: Check PostgreSQL migrations
        env:
          DATABASE_URL: postgresql+psycopg://imagegen:imagegen_test_password@127.0.0.1:5432/imagegen_test
        run: |
          alembic upgrade head
          alembic check

      - name: Drill PostgreSQL restore
        env:
          POSTGRES_CONTAINER: ${{ job.services.postgres.id }}
        run: |
          trap 'docker exec "$POSTGRES_CONTAINER" dropdb -U imagegen --if-exists imagegen_restore' EXIT
          docker exec "$POSTGRES_CONTAINER" pg_dump -U imagegen -d imagegen_test --format=custom --file=/tmp/imagegen.dump
          docker exec "$POSTGRES_CONTAINER" createdb -U imagegen imagegen_restore
          docker exec "$POSTGRES_CONTAINER" pg_restore -U imagegen -d imagegen_restore /tmp/imagegen.dump
          DATABASE_URL=postgresql+psycopg://imagegen:imagegen_test_password@127.0.0.1:5432/imagegen_restore alembic check

      - name: Run tests with coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report

      - name: Run PostgreSQL tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://imagegen:imagegen_test_password@127.0.0.1:5432/imagegen_test
        run: python -m pytest -q

      - name: Run browser tests
        run: npm run test:e2e

      - name: Audit dependencies
        run: |
          python -m pip_audit -r requirements.txt
          npm audit --audit-level=high
