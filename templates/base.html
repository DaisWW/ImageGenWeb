<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#101315">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='assets/favicon-v2.ico') }}" sizes="any">
  <link rel="icon" type="image/png" sizes="64x64" href="{{ url_for('static', filename='assets/favicon-64-v2.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='assets/apple-touch-icon-v2.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/workspaces.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/conversation.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/chat-composer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/jobs.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/generation-composer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/dialogs.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/shell-pages.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/admin-overview.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/admin-settings.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app/motion-responsive.css') }}">
  <script src="{{ url_for('static', filename='vendor/lucide-0.468.0.min.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block body %}{% endblock %}
  <div class="toast-region" id="toastRegion" popover="manual" aria-live="polite"></div>
  {% block scripts %}{% endblock %}
</body>
</html>
